<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{navbar :: vercel-css}"></th:block>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card card-vercel p-5" style="width: 100%; max-width: 450px; border-radius: 12px;">
        <h2 class="text-center mb-4 text-white fw-bold">Tạo tài khoản</h2>

        <form th:action="@{/register}" method="post" th:object="${student}">
            <div class="mb-3">
                <label class="form-label text-secondary fw-medium">Tên đăng nhập (Username)</label>
                <input type="text" th:field="*{username}" class="form-control form-control-vercel py-2" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary fw-medium">Email</label>
                <input type="email" th:field="*{email}" class="form-control form-control-vercel py-2" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary fw-medium">Mật khẩu (Password)</label>
                <input type="password" th:field="*{password}" class="form-control form-control-vercel py-2" required>
            </div>
            <button type="submit" class="btn btn-vercel-primary w-100 py-2 mb-4">Hoàn tất Đăng ký</button>
        </form>

        <div class="text-center mt-2">
            <span class="text-secondary">Đã có tài khoản?</span> <a href="/login" class="text-white text-decoration-none border-bottom border-light pb-1">Đăng nhập</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
