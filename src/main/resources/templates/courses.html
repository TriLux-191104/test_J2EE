<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{navbar :: vercel-css}"></th:block>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-3">
        <h2 class="text-white fw-bold fs-1 tracking-tight m-0">Quản lý Học Phần</h2>
        <a th:href="@{/admin/courses/new}" class="btn btn-vercel-primary px-4 py-2">+ Thêm học phần mới</a>
    </div>

    <div class="table-responsive rounded-4 border border-secondary" style="border-color: #333 !important;">
        <table class="table table-vercel table-hover align-middle mb-0 text-center">
            <thead>
            <tr>
                <th class="py-3 px-4">ID</th>
                <th class="py-3 px-4">Hình ảnh</th>
                <th class="py-3 px-4 text-start">Tên học phần</th>
                <th class="py-3 px-4">Tín chỉ</th>
                <th class="py-3 px-4">Giảng viên</th>
                <th class="py-3 px-4">Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td class="py-3 px-4 text-secondary" th:text="${course.id}"></td>
                <td class="py-3 px-4"><img th:src="${course.image}" style="width: 80px; height: 50px; object-fit: cover; border-radius: 6px; border: 1px solid #333;"></td>
                <td class="py-3 px-4 fw-bold text-white text-start" th:text="${course.name}"></td>
                <td class="py-3 px-4 text-secondary" th:text="${course.credits}"></td>
                <td class="py-3 px-4 text-secondary" th:text="${course.lecturer}"></td>
                <td class="py-3 px-4">
                    <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-outline-light me-2 rounded-2">Sửa</a>
                    <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn btn-sm btn-danger rounded-2" onclick="return confirm('Bạn có chắc chắn muốn xóa học phần này?');">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
