<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Danh sách học phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{navbar :: vercel-css}"></th:block>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container">
    <h2 class="mb-5 text-center text-white fw-bold fs-1 tracking-tight">Khám phá Học phần</h2>

    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-4" th:each="course : ${courses}">
            <div class="card h-100 card-vercel rounded-4 overflow-hidden">
                <img th:src="${course.image}" alt="Course Image" style="height: 200px; object-fit: cover; border-bottom: 1px solid #333;">
                <div class="card-body d-flex flex-column p-4">
                    <h5 class="card-title text-white fw-bold fs-4 mb-3" th:text="${course.name}">Tên môn học</h5>
                    <p class="card-text text-secondary mb-4" style="font-size: 0.95rem;">
                        <span class="d-block mb-2"><strong>Số tín chỉ:</strong> <span class="text-white" th:text="${course.credits}"></span></span>
                        <span class="d-block"><strong>Giảng viên:</strong> <span class="text-white" th:text="${course.lecturer}"></span></span>
                    </p>

                    <div class="mt-auto" sec:authorize="hasRole('STUDENT')">
                        <form th:action="@{/enroll/{id}(id=${course.id})}" method="post">
                            <button type="submit" class="btn btn-vercel-primary w-100 py-2">Đăng ký ngay</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-5 mb-5">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                <a class="page-link bg-transparent border-secondary text-white" th:href="@{/home(page=${currentPage - 1}, keyword=${keyword})}">Trang trước</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                <a class="page-link bg-transparent border-secondary text-white" th:href="@{/home(page=${currentPage + 1}, keyword=${keyword})}">Trang sau</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
