<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học phần của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{navbar :: vercel-css}"></th:block>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-5 text-white fw-bold fs-1 tracking-tight">Học phần đã đăng ký</h2>

    <div class="table-responsive rounded-4 border border-secondary" style="border-color: #333 !important;">
        <table class="table table-vercel table-hover align-middle mb-0">
            <thead>
            <tr>
                <th class="py-3 px-4">Mã HP</th>
                <th class="py-3 px-4">Tên học phần</th>
                <th class="py-3 px-4">Số tín chỉ</th>
                <th class="py-3 px-4">Giảng viên</th>
                <th class="py-3 px-4">Ngày đăng ký</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="en : ${enrollments}">
                <td class="py-3 px-4" th:text="${en.course.id}"></td>
                <td class="py-3 px-4 fw-bold text-white" th:text="${en.course.name}"></td>
                <td class="py-3 px-4 text-secondary" th:text="${en.course.credits}"></td>
                <td class="py-3 px-4 text-secondary" th:text="${en.course.lecturer}"></td>
                <td class="py-3 px-4 text-secondary" th:text="${en.enrollDate}"></td>
            </tr>
            <tr th:if="${enrollments.empty}">
                <td colspan="5" class="text-center text-secondary py-5">Bạn chưa đăng ký học phần nào. Hãy quay lại trang chủ để đăng ký nhé.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
