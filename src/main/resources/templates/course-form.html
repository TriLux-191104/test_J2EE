<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm/Sửa Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <th:block th:replace="~{navbar :: vercel-css}"></th:block>
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-4 mb-5">
    <div class="card card-vercel p-5 mx-auto rounded-4" style="max-width: 650px;">
        <h3 class="mb-5 text-center text-white fw-bold fs-2" th:text="${course.id == null ? 'Thêm Học Phần' : 'Cập Nhật Học Phần'}"></h3>

        <form th:action="@{/admin/courses/save}" method="post" th:object="${course}" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">

            <div class="mb-4">
                <label class="form-label text-secondary fw-medium">Tên học phần</label>
                <input type="text" th:field="*{name}" class="form-control form-control-vercel py-2" required>
            </div>

            <div class="mb-4">
                <label class="form-label text-secondary fw-medium">Hình ảnh (Upload File)</label>
                <input type="file" name="imageFile" class="form-control form-control-vercel py-2 text-secondary" accept="image/png, image/jpeg" th:required="${course.id == null}">
                <div th:if="${course.image != null}" class="mt-3 p-3 rounded-3" style="background-color: #111; border: 1px solid #333;">
                    <p class="text-secondary mb-2" style="font-size: 0.85rem;">Ảnh hiện tại:</p>
                    <img th:src="${course.image}" style="width: 120px; height: auto; border-radius: 4px; border: 1px solid #333;">
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label text-secondary fw-medium">Số tín chỉ</label>
                    <input type="number" th:field="*{credits}" class="form-control form-control-vercel py-2" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-secondary fw-medium">Giảng viên</label>
                    <input type="text" th:field="*{lecturer}" class="form-control form-control-vercel py-2" required>
                </div>
            </div>

            <div class="mb-5">
                <label class="form-label text-secondary fw-medium">Danh mục (Category)</label>
                <select th:field="*{category.id}" class="form-select form-control-vercel py-2">
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>

            <div class="d-flex justify-content-between align-items-center">
                <a href="/admin/courses" class="btn btn-vercel-outline px-4 py-2">Quay lại</a>
                <button type="submit" class="btn btn-vercel-primary px-5 py-2">Lưu thông tin</button>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
